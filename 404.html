<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#012169" />
<title>Page not found — Robert Swinney</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23012169'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='17' fill='white' text-anchor='middle'%3ERS%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;
    padding:2rem;color:#fff;
    background:radial-gradient(120% 150% at 72% 12%,#0a2a5e 0%,#04183c 48%,#020f29 100%);
    font-family:"Roboto",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .code{font-family:"EB Garamond",Georgia,serif;font-weight:600;
    font-size:clamp(4rem,16vw,7rem);line-height:1;color:#fff;margin:0;
    text-shadow:0 2px 34px rgba(0,0,0,.5)}
  .rule{width:54px;height:3px;background:#00539B;border:0;margin:1.4rem auto 1.6rem}
  h1{font-family:"EB Garamond",Georgia,serif;font-weight:600;font-size:clamp(1.5rem,4vw,2rem);
    margin:0 0 .6rem;color:#fff}
  p{color:#aebfd9;margin:0 0 2rem;font-size:1rem}
  a.home{display:inline-block;text-decoration:none;color:#fff;
    border:1px solid rgba(169,196,232,.55);border-radius:50px;padding:.6rem 1.4rem;
    font-size:.92rem;font-weight:500;transition:border-color .15s,background .15s}
  a.home:hover{border-color:#a9c4e8;background:rgba(169,196,232,.12)}
  a.home:focus-visible{outline:2px solid #a9c4e8;outline-offset:3px}
</style>
</head>
<body>
  <div>
    <p class="code">404</p>
    <hr class="rule" />
    <h1>Page not found</h1>
    <p>The page you were looking for doesn&rsquo;t exist or has moved.</p>
    <a class="home" href="/">Return home</a>
  </div>
</body>
</html>
